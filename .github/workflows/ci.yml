name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  flutter:
    name: Flutter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosita/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Show toolchain
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: ./tool/flutterw pub get

      - name: Analyze
        run: ./tool/flutterw analyze

      - name: Test
        run: ./tool/flutterw test

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show toolchain
        run: |
          cargo --version
          rustc --version

      - name: Check formatting
        working-directory: native
        run: ./tool/cargow fmt --all -- --check

      - name: Test
        working-directory: native
        run: ./tool/cargow test --workspace
